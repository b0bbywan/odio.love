name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  links:
    name: Check links
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # odio.love/* are vercel redirects (not files in dist); checked by the redirects job.
          # /releases.xml is an on-demand function route, not a static file in dist.
          # The rest are bot-hostile hosts that return junk status codes.
          args: >-
            --root-dir ./dist/client
            --exclude 'https://odio.love/.*'
            --exclude 'releases\.xml'
            --exclude 'https://docs.odio.love/.*'
            --exclude 'https://pwa.odio.love/.*'
            --exclude 'https://(.*\.)?linkedin\.com/.*'
            --exclude 'https://(.*\.)?medium\.com/.*'
            --exclude 'http://(.*\.)?bluez\.org/.*'
            --exclude 'https://gnudb\.org/.*'
            --exclude 'https://pipewire\.org/.*'
            --accept 200,403,418
            --insecure
            ./dist/client
          fail: true

  redirects:
    name: Check redirects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm run check:redirects
